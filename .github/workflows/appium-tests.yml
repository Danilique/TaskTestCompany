name: Android Appium Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install emulator
        run: |
          sdkmanager "platform-tools" "platforms;android-30" "emulator"
          sdkmanager "system-images;android-30;google_apis;x86_64"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name "test_avd" \
            --abi "google_apis/x86_64" \
            --package "system-images;android-30;google_apis;x86_64" \
            --force

      - name: Start Emulator
        run: |
          nohup $ANDROID_HOME/emulator/emulator \
            -avd test_avd \
            -no-audio -no-window \
            -gpu swiftshader_indirect \
            -no-snapshot -wipe-data &
          adb wait-for-device
          timeout 120 bash -c \
            'until [[ "$(adb shell getprop sys.boot_completed 2>/dev/null)" == "1" ]]; do sleep 5; done'
          echo "Emulator ready!"

      - name: Install Appium
        run: |
          npm install -g appium@2.0.0
          appium driver install uiautomator2

      - name: Start Appium Server
        run: |
          nohup appium --port 4723 --log appium.log &
          sleep 5

      - name: Run Tests
        run: |
          ./gradlew test \
            -Dcucumber.tags="@smoke"

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: build/allure-results

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            build/reports/
            appium.log